# MySQL XAMPP Database Connection
# The ?createDatabaseIfNotExist=true creates the database automatically
spring.datasource.url=jdbc:mysql://localhost:3306/snackdash_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# THIS IS THE MAGIC LINE that creates/updates the tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect